name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for droplet SSH to be ready..."
          for i in $(seq 1 20); do
            if nc -z -w5 ${{ secrets.DROPLET_IP }} 22 2>/dev/null; then
              echo "SSH is ready after $i attempts"
              break
            fi
            echo "Attempt $i/20 failed, waiting 15s..."
            sleep 15
          done

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            APP_DIR="/var/www/outlawed-beauty"

            # Wait for cloud-init to finish if still running
            cloud-init status --wait 2>/dev/null || true

            # Install Node.js 20 if not present
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
              npm install -g pm2
            fi

            # Clone or pull latest code
            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR && git pull origin main
            else
              git clone https://github.com/support634/outlawed-beauty.git $APP_DIR
              cd $APP_DIR
            fi

            # Ensure swap exists for build (1GB RAM needs help)
            if [ ! -f /swapfile ]; then
              fallocate -l 1G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi

            # Install and build
            cd $APP_DIR
            npm ci --production=false
            npm run build

            # Start or restart with PM2
            if pm2 list | grep -q "outlawed-beauty"; then
              pm2 restart outlawed-beauty
            else
              pm2 start npm --name "outlawed-beauty" -- start -- -p 3000
              pm2 save
              pm2 startup systemd -u root --hp /root || true
              systemctl enable pm2-root 2>/dev/null || true
            fi

            # Install and configure Nginx as reverse proxy
            if ! command -v nginx &> /dev/null; then
              apt-get install -y nginx
            fi

            echo '' | base64 -d > /etc/nginx/sites-available/outlawed-beauty

            ln -sf /etc/nginx/sites-available/outlawed-beauty /etc/nginx/sites-enabled/outlawed-beauty
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx || systemctl restart nginx
            systemctl enable nginx

            echo "Deployment complete! App running at http://$(curl -s ifconfig.me)"
